        tag: "Getting your eyes off yourself and onto Him",
        duration: "5 min",
        complete: true,
        teaching: `Prayer begins with a shift — off yourself and onto God.

When life is heavy, the instinct is to lead with your problems. But Jesus opens with "Our Father in heaven" — an act of worship before a single request is made. Worship isn't about what God has done for you. It's about who He is, regardless of what you're going through. Holy. Sovereign. Good in His very nature. That's true on your best day and your worst.

This is why prayer is more than asking — it's turning. Turning toward a Father who is big enough to carry what you can't. Peter said it plainly: cast all your anxiety on Him, because He cares for you (1 Peter 5:7). Prayer is how you do that. You bring what's weighing on you and you lay it at the feet of the One who can actually bear it.

So before anything else — look up. Get your eyes off your situation and fix them on Him.`,
        practice: "Before saying anything else, spend 60 seconds naming who God is — not what He's done for you, but who He is. Eternal. Holy. Good in His nature. Let that be the first thing out of your mouth.",

      {
        id: 2,
        phrase: "Hallowed be your name",
        tag: "Orienting your heart",
        duration: "5 min",
        complete: true,
        teaching: `To hallow something is to set it apart as holy — weighty, sacred, unlike anything else. When Jesus teaches us to pray "hallowed be your name," he's teaching us to worship before we ask.

And worship does something to us. When we declare who God is, we remind ourselves of what is actually true — regardless of what our circumstances are telling us.

He is the Creator of the universe. Everything that exists came from Him and is held together by Him. He is our Saviour — the one who entered our broken world to redeem it. He is El Shaddai, the Almighty God who appeared to Abraham, who makes promises and keeps them. His word does not return void — it goes out and accomplishes exactly what He sends it to do (Isaiah 55:11).

This is why His name is not ordinary. His name carries power — real power. It is the name above every other name. But the power isn't a formula we wield; it belongs to Him. When we use His name rightly — with reverence, with faith, in alignment with who He is — we are praying with the full weight of His authority behind us. We are not manipulating God; we are coming into agreement with Him.

We don't treat His name casually. We don't throw it around. We hallow it, because He is holy and His name is holy.

Hallowing His name isn't just an opening formality. It's a declaration of who is in charge — and who you are trusting with everything that follows.`,
        practice: "Name three things that are true about who God is — not what He's done, but who He is. Speak them out loud before you ask Him for anything.",

      {
        id: 3,
        phrase: "Your kingdom come, your will be done, on earth as it is in heaven",
        tag: "Surrendering your agenda",
        duration: "6 min",
        complete: false,
        teaching: `This line is where prayer gets costly. "Your kingdom come, your will be done" is not a passive wish — it's an active surrender of your own agenda.

Jesus said it plainly: seek first the kingdom of God and his righteousness, and everything else will be added to you (Matthew 6:33). That's not a prosperity formula — it's a reordering of priorities. When God's agenda comes first, everything else falls into its rightful place.

And here's what happens when we truly belong to Christ: He doesn't just give us what we desire — He changes what we desire. Psalm 37:4 says He will give you the desires of your heart. But the promise isn't that He rubber-stamps your current wish list. It's that as you delight in Him, your desires begin to look more like His. Your heart gets transformed from the inside out.

This is also why we have to be honest about our requests. When we focus on what God wants, we start to see that some of what we ask for is selfish — good for us but not for the Kingdom. Prayer isn't just offloading our burdens onto God. We take on His yoke too. What He cares about becomes what we care about.

Think of it this way: a kingdom's citizens don't resent the king's power — they depend on it. The more the king's authority is established, the more his citizens live in safety, security, and provision. When we pray "your kingdom come," we are declaring that we want more of His rule, not less — because we know that His reign is what's best for everyone, including us.

"On earth as it is in heaven" is the vision behind the prayer. Heaven is the template — wholeness, justice, peace, the absence of brokenness. When we pray this line we are asking God to let that reality break into our current one. Not just as a future hope but as a present invasion. And we don't just pray it — we become part of how it happens. Every time the Church pursues justice, restores a broken relationship, or cares for someone in need, that's on earth as it is in heaven being lived out.`,
        practice: "Write down one thing you've been asking God for. Then honestly ask: is this for the Kingdom, or just for me? Bring both the request and the question to Him.",

      {
        id: 4,
        phrase: "Give us today our daily bread",
        tag: "Dependence and provision",
        duration: "5 min",
        complete: false,
        teaching: `"Give us this day our daily bread" sounds simple — but the word Jesus uses for "daily" is one of the most debated words in the New Testament. The Greek word epiousios doesn't have a clean translation. It can mean daily, but it can also mean supersubstantial — bread of a higher order. Bread for the coming day. Transcendent bread. Some early church fathers connected it directly to Jesus himself, the bread of life (John 6:35).

So this petition is bigger than asking God to cover your bills. It's asking for perpetual provision — not just for today's need but for the ongoing sustaining of everything God has called you to.

But here's what this prayer is not: it's not a prayer for passivity. Jesus isn't teaching us to sit still and wait for bread to appear. The pattern throughout Scripture is partnership — you bring what you have, God multiplies it. The boy with five loaves and two fish didn't stay home. The servants at the wedding filled the jars before the water became wine. You plant the seed, God brings the harvest.

This is the seed-planting prayer. You do everything within your power to become the person God has called you to be — you develop your gifts, you serve others, you show up, you create value — and then you bring it to God and say: I've done what I can do. Now do what only You can do.

The provision follows the person. If God has called you to financial abundance, He's also calling you to become someone who consistently creates value for others — and the money follows that person. If He's called you to influence, He's calling you to become someone worth listening to — and the platform follows that person. You don't pray for the harvest and skip the planting. You plant everything you have, and you trust God with the rain.`,
        practice: "Name one area where you've been waiting on God but haven't yet done the work you know to do. Bring both to Him — your commitment to act and your dependence on Him for what only He can provide.",

      {
        id: 5,
        phrase: "Forgive us our debts",
        tag: "The confession before the asking",
        duration: "7 min",
        complete: false,
        teaching: `The word Jesus uses for "debts" here is a financial term. It means something owed — a ledger with a balance that needs to be cleared. When we pray "forgive us our debts," we are asking God to erase what we owe for the places we fell short. Not just the things we did wrong, but the things we failed to do. The gaps between who He called us to be and who we showed up as.

This isn't a prayer for self-punishment. It's a prayer for self-awareness.

Confession is how we develop sensitivity to God's leading. When you take time to look back honestly — not to beat yourself up, but to notice — you start to see the places where God was nudging you in one direction and you went another. The moment you could have been generous and weren't. The conversation you should have had and avoided. The thing you knew to do and didn't. Seeing those moments clearly isn't condemnation — it's calibration. It's how you become more attuned to His voice going forward.

Underneath this prayer is the cry of Psalm 51 — David's prayer after his greatest failure: "Cast me not away from your presence, O Lord, and take not your Holy Spirit from me." That's the real ask. Not just forgiveness from consequences, but restoration of closeness. Don't let my failures create distance between us. Have mercy, because I am judging myself honestly and I want to be near you.

This is what makes confession powerful — it's not about earning your way back. It's about refusing to let shame keep you at a distance from the One who already paid the debt.`,
        practice: "Think back over the last 24 hours. Where did you miss it — not to condemn yourself, but to notice. Bring one specific moment to God. Ask Him to erase the debt and show you what He was trying to lead you toward.",
        distinction: null,
      },
      {
        id: 6,
        phrase: "As we forgive our debtors",
        tag: "Receiving and giving are linked",
        duration: "6 min",
        complete: false,
        teaching: `This line is the mirror of the one before it. You just asked God to erase your debts — the places you fell short, the things you owed and couldn't pay. Now Jesus turns it around: are you willing to do the same for the people around you?

This is the only line in the Lord's Prayer that Jesus goes back and unpacks after he finishes (Matthew 6:14–15). That's not an accident. He knows this is the hard one.

Jesus told a parable about a servant who owed his king an impossible debt — millions of dollars in today's terms. The king forgave it entirely, wiped the ledger clean. That same servant walked out and found a fellow servant who owed him a few dollars. He grabbed him by the throat and demanded payment. When the king heard what happened, he was furious. How could someone who had been forgiven so much refuse to forgive so little?

That's the question Jesus is putting to us. If we can't do for others what God is doing for us — what right do we have to ask God for forgiveness?

Now here's the important distinction: forgiving someone doesn't mean there are no consequences. The servant in the parable still faced consequences for what he did. Forgiveness isn't pretending nothing happened. It isn't saying what they did was okay. It isn't even necessarily reconciling the relationship.

Forgiveness means you stop trying to collect the debt. You release your claim on what they owe you — the apology, the acknowledgment, the payback. You take your hands off the ledger and hand it to God. You are no longer the one trying to make them pay.

This frees you as much as it frees them. An unforgiving heart is a closed hand — it cannot receive what it will not give.`,
        practice: "Is there someone you're still trying to collect from? Not necessarily in action — but in your heart, are you keeping a record? Name them honestly before God. Tell Him you're releasing your claim, even if the feeling hasn't caught up yet.",
        distinction: null,

      {
        id: 7,
        phrase: "Deliver us from evil",
        tag: "You're in a battle",
        duration: "5 min",
        complete: false,
        teaching: `We tend to read "deliver us from evil" as a prayer about outside forces — darkness, spiritual opposition, the enemy. And while those are real, Jesus is pointing at something closer to home.

James 1:14 says each person is tempted when they are dragged away by their own desires and enticed. The battle isn't just out there. It's in here. Most of the evil we do — or fall into — comes from one of two places: we want something we're not ready for or not supposed to have, or we don't trust that God is just and good enough to give us what we actually need.

Those two roots — impatience and distrust — are behind more sin than most people realize. The person who lies to get ahead doesn't trust God to promote them in His timing. The person who takes what isn't theirs doesn't believe God is their source. The person who chases what they were told to wait for doesn't believe the wait is worth it.

So "deliver us from evil" is really a prayer about the condition of your heart. It's asking God to help you keep your motives right and your attitude toward Him right. Do I actually trust Him? Do I believe He is for me and not against me? Do I believe He is my source — that He isn't trying to hold me back but is trying to help me become the fullest version of what He created me to be?

This is the prayer that closes the loop. You started by getting your eyes off yourself and onto God. You declared His name holy. You surrendered your agenda. You asked for provision and forgiveness and the grace to forgive others. Now you end by asking God to guard your heart — because a heart that truly trusts Him has very little room for temptation to take root.

He is with you. He won't forsake you. He is your source. He is not trying to keep you down — He is trying to raise you up into His image. Believe that, and the pull of temptation loses most of its power.`,
        practice: "Ask yourself honestly: where am I being pulled right now? Is it impatience — wanting something before its time? Or distrust — not believing God will come through? Bring that specific thing to Him and tell Him you choose to trust Him with it.",
        distinction: null,

      {
        id: 8,
        phrase: "For thine is the kingdom, and the power, and the glory, forever",
        tag: "Returning to where you started — Him",
        duration: "4 min",
        complete: false,
        teaching: `The prayer doesn't end with you. It ends with Him.

You opened by looking up — getting your eyes off yourself and fixing them on God. Every line since then has been a journey: surrendering your agenda, trusting Him for provision, clearing your debts, releasing others, guarding your heart. And now you arrive back at the place you started. Worship.

"For thine is the kingdom" — not mine. The kingdom I just prayed to come is His, not something I build or control. He is the King.

"And the power" — not mine either. Everything I just asked for — provision, forgiveness, deliverance — none of it comes from my own effort or striving. The power belongs to Him. I am dependent, and I am at peace with that.

"And the glory, forever" — this is the final declaration. Whatever comes from this prayer, whatever God does in response, whatever changes in me or around me — the glory goes to Him. Not to my faithfulness, not to my technique, not to how well I prayed. To Him.

This doxology reframes the entire prayer. It's a reminder that prayer isn't primarily a tool for getting things done. It's an act of worship. You came to God, you laid everything before Him, and now you leave it there — hands open, eyes up, declaring that He is the kingdom, He is the power, He is the glory.

Forever. Amen.`,
        practice: "Close your prayer today by declaring out loud: 'Yours is the kingdom, yours is the power, yours is the glory — not mine.' Let it be the last thing you say. Then be still for a moment and let that land.",
        distinction: null,
      },

        teaching: `There is a reason the ancient church prayed at dawn. Before the noise starts. Before the demands arrive. Before the world tells you who you are and what you need to do today — you orient yourself to God first.

    const pick = (category, n = 2) => {
      const pool = SCRIPTURES[category] || SCRIPTURES.kingdom;
      const shuffled = [...pool].sort(() => Math.random() - 0.5);
      return shuffled.slice(0, n);
    };

    // Legacy alias for existing guided prayer
    const pickScriptures = (n = 2) => pick("kingdom", n);

    // ── Practice Timer ────────────────────────────────────────────────────────
    function PracticeTimer({ practiceText }) {
      const [state, setState] = useState("idle");
      const [seconds, setSeconds] = useState(60);
      const [musicOn, setMusicOn] = useState(false);
      const audioRef = useRef(null);
      const intervalRef = useRef(null);

      useEffect(() => {
        audioRef.current = new Audio(MUSIC_URL);
        audioRef.current.loop = true;
        audioRef.current.volume = 0.35;
        return () => { audioRef.current.pause(); clearInterval(intervalRef.current); };
      }, []);

      const toggleMusic = () => {
        if (musicOn) { audioRef.current.pause(); setMusicOn(false); }
        else { audioRef.current.play().catch(() => {}); setMusicOn(true); }
      };

      const startTimer = () => {
        setState("running");
        setSeconds(60);
        audioRef.current.play().catch(() => {});
        setMusicOn(true);
        intervalRef.current = setInterval(() => {
          setSeconds(prev => {
            if (prev <= 1) {
              clearInterval(intervalRef.current);
              setState("done");
              audioRef.current.pause();
              setMusicOn(false);
              return 0;
            }
            return prev - 1;
          });
        }, 1000);
      };

      const resetTimer = () => {
        clearInterval(intervalRef.current);
        setState("idle");
        setSeconds(60);
        audioRef.current.pause();
        setMusicOn(false);
      };

      const circumference = 2 * Math.PI * 44;
      const progress = state === "idle" ? 1 : seconds / 60;
      const dashOffset = circumference * (1 - progress);

      return (
        <div style={{ background: C.ink, borderRadius: 16, padding: "22px 20px", marginTop: 20 }}>
          <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.12em", color: "rgba(255,255,255,0.4)", textTransform: "uppercase", marginBottom: 10 }}>Practice</div>
          <div style={{ fontSize: 13, lineHeight: 1.65, color: "rgba(255,255,255,0.75)", marginBottom: 22 }}>{practiceText}</div>

          <div style={{ display: "flex", alignItems: "center", gap: 20 }}>
            {/* Ring */}
            <div style={{ position: "relative", width: 100, height: 100, flexShrink: 0 }}>
              <svg width="100" height="100" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="44" fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="5" />
                <circle cx="50" cy="50" r="44" fill="none"
                  stroke={state === "done" ? C.sage : C.accent}
                  strokeWidth="5" strokeLinecap="round"
                  strokeDasharray={circumference}
                  strokeDashoffset={dashOffset}
                  transform="rotate(-90 50 50)"
                  style={{ transition: "stroke-dashoffset 0.9s linear, stroke 0.4s" }}
                />
              </svg>
              <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
                {state === "done"
                  ? <span style={{ fontSize: 22, color: C.sage }}>✓</span>
                  : <>
                      <span style={{ fontSize: 26, fontWeight: 700, color: C.white, lineHeight: 1 }}>{seconds}</span>
                      <span style={{ fontSize: 10, color: "rgba(255,255,255,0.4)", letterSpacing: "0.06em" }}>sec</span>
                    </>
                }
              </div>
            </div>

            {/* Buttons */}
            <div style={{ flex: 1 }}>
              {state === "idle" && (
                <button onClick={startTimer} style={{ background: C.accent, color: C.white, border: "none", borderRadius: 10, padding: "12px 0", fontSize: 14, fontWeight: 600, cursor: "pointer", width: "100%", marginBottom: 10 }}>
                  Begin practice
                </button>
              )}
              {state === "running" && (
                <button onClick={resetTimer} style={{ background: "rgba(255,255,255,0.08)", color: "rgba(255,255,255,0.6)", border: "none", borderRadius: 10, padding: "12px 0", fontSize: 13, cursor: "pointer", width: "100%", marginBottom: 10 }}>
                  Reset
                </button>
              )}
              {state === "done" && (
                <button onClick={resetTimer} style={{ background: C.sage, color: C.white, border: "none", borderRadius: 10, padding: "12px 0", fontSize: 13, fontWeight: 600, cursor: "pointer", width: "100%", marginBottom: 10 }}>
                  Go again
                </button>
              )}
              <button onClick={toggleMusic} style={{ background: "rgba(255,255,255,0.06)", border: `1px solid ${musicOn ? C.accent : "rgba(255,255,255,0.1)"}`, borderRadius: 10, padding: "10px 0", fontSize: 12, color: musicOn ? C.accent : "rgba(255,255,255,0.45)", cursor: "pointer", width: "100%", display: "flex", alignItems: "center", justifyContent: "center", gap: 6, fontWeight: 500 }}>
                {musicOn ? "♪ Music on" : "♪ Play music"}
              </button>
            </div>
          </div>

          {state === "done" && (
            <div style={{ marginTop: 16, fontSize: 13, color: "rgba(255,255,255,0.5)", textAlign: "center" }}>
              Well done. Take a breath before moving on.
            </div>
          )}
        </div>
      );
    }

    // ── Fast Timer ────────────────────────────────────────────────────────────
    function FastTimer({ startTime }) {
      const [, setTick] = useState(0);
      useEffect(() => {
        const id = setInterval(() => setTick(t => t + 1), 1000);
        return () => clearInterval(id);
      }, []);
      const diff = Math.floor((new Date() - startTime) / 1000);
      const h = Math.floor(diff / 3600).toString().padStart(2, "0");
      const m = Math.floor((diff % 3600) / 60).toString().padStart(2, "0");
      const s = (diff % 60).toString().padStart(2, "0");
      return <span>{h}:{m}:{s}</span>;
    }



    // ── Shared: Fade Entry List ───────────────────────────────────────────────
    function FadeEntryList({ items, color, shownKey, shown, onShowMore }) {
      const limit = shown[shownKey] || 3;
      const visible = items.slice(0, limit);
      const prevLimit = React.useRef(limit);
      const remaining = items.length - visible.length;

      if (items.length === 0) return (
        <div style={{ fontSize: 13, color: "#8A93A8", fontStyle: "italic", padding: "8px 0" }}>
          Nothing added yet — head to your board to add some.
        </div>
      );

      return (
        <div>
          {visible.map((e, i) => (
            <div key={e.id}
              className={i >= (prevLimit.current - 3) && i < limit ? "fade-in" : ""}
              style={{ display: "flex", gap: 10, alignItems: "flex-start", marginBottom: 10 }}>
              <div style={{ width: 6, height: 6, borderRadius: "50%", background: color, flexShrink: 0, marginTop: 6 }} />
              <div style={{ fontSize: 14, color: "#2C3347", lineHeight: 1.6 }}>
                {e.name ? <strong>{e.name}</strong> : null}{e.name ? " — " : ""}{e.text}
              </div>
            </div>
          ))}
          {remaining > 0 && (
            <button onClick={() => { prevLimit.current = limit; onShowMore(shownKey, items.length); }}
              style={{ background: "none", border: `1px solid ${color}`, borderRadius: 20, padding: "6px 16px", fontSize: 12, color: color, cursor: "pointer", fontWeight: 600, marginTop: 4, transition: "all 0.2s" }}>
              + {Math.min(remaining, 3)} more
            </button>
          )}
        </div>
      );
    }

    // ── Shared: Step Prayer Shell ─────────────────────────────────────────────
    function StepPrayerShell({ title, subtitle, steps, onClose, accentColor }) {
      const [step, setStep]           = React.useState(0);
      const [countdown, setCountdown] = React.useState(15);
      const [unlocked, setUnlocked]   = React.useState(false);
      const [shown, setShown]         = React.useState({});
      const timerRef                  = React.useRef(null);
      const isLast = step === steps.length - 1;

      // Reset countdown each time step changes
      React.useEffect(() => {
        setCountdown(15);
        setUnlocked(false);
        clearInterval(timerRef.current);
        timerRef.current = setInterval(() => {
          setCountdown(prev => {
            if (prev <= 1) {
              clearInterval(timerRef.current);
              setUnlocked(true);
              return 0;
            }
            return prev - 1;
          });
        }, 1000);
        return () => clearInterval(timerRef.current);
      }, [step]);

      const showMore = (key, total) => setShown(s => ({ ...s, [key]: Math.min((s[key] || 3) + 3, total) }));

      const current = steps[step];
      const color = current.color || accentColor || "#6B5FD6";

      // Progress dots
      const Dots = () => (
        <div style={{ display: "flex", gap: 6, justifyContent: "center", marginBottom: 24 }}>
          {steps.map((_, i) => (
            <div key={i} style={{ width: i === step ? 20 : 6, height: 6, borderRadius: 3, background: i === step ? color : i < step ? color + "60" : "#DDE3F0", transition: "all 0.3s" }} />
          ))}
        </div>
      );

      // Countdown ring
      const CountdownRing = () => {
        const r = 18, circ = 2 * Math.PI * r;
        const progress = countdown / 15;
        return (
          <svg width="44" height="44" viewBox="0 0 44 44" style={{ flexShrink: 0 }}>
            <circle cx="22" cy="22" r={r} fill="none" stroke="#DDE3F0" strokeWidth="3" />
            <circle cx="22" cy="22" r={r} fill="none" stroke={color} strokeWidth="3"
              strokeLinecap="round" strokeDasharray={circ}
              strokeDashoffset={circ * (1 - progress)}
              transform="rotate(-90 22 22)"
              style={{ transition: "stroke-dashoffset 0.9s linear" }} />
            <text x="22" y="27" textAnchor="middle" fontSize="12" fontWeight="700" fill={color}>{countdown}</text>
          </svg>
        );
      };

      return (
        <div style={{ minHeight: "100vh", background: "#EEF1F8", display: "flex", flexDirection: "column" }}>
          {/* Fixed header */}
          <div style={{ padding: "52px 5vw 16px", background: "#EEF1F8", borderBottom: "1px solid #DDE3F0" }}>
            <button onClick={onClose} style={{ background: "none", border: "none", fontSize: 13, color: color, cursor: "pointer", padding: "0 0 12px 0", fontWeight: 500 }}>← Back</button>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.12em", color: "#8A93A8", textTransform: "uppercase", marginBottom: 4 }}>Guided Prayer</div>
            <div style={{ fontSize: 20, fontWeight: 700, color: "#1A1F2E", letterSpacing: "-0.02em" }}>{title}</div>
          </div>

          {/* Scrollable content */}
          <div style={{ flex: 1, overflowY: "auto", padding: "24px 5vw", maxWidth: 600, margin: "0 auto", width: "100%" }}>
            <Dots />

            {/* Section card — fades in on step change */}
            <div key={step} className="fade-in">
              {/* Section header */}
              <div style={{ marginBottom: 16 }}>
                <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", color: color, textTransform: "uppercase", marginBottom: 6 }}>
                  {step + 1} of {steps.length}
                </div>
                <div style={{ fontSize: 20, fontWeight: 700, color: "#1A1F2E", letterSpacing: "-0.02em", marginBottom: 4 }}>
                  {current.title}
                </div>
                {current.subtitle && (
                  <div style={{ fontSize: 13, color: "#8A93A8", fontStyle: "italic" }}>"{current.subtitle}"</div>
                )}
              </div>

              {/* Scripture */}
              {current.scripture && (
                <div style={{ background: color + "15", borderLeft: `3px solid ${color}`, borderRadius: "0 10px 10px 0", padding: "12px 14px", marginBottom: 16 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: color, marginBottom: 4 }}>{current.scripture.ref}</div>
                  <div style={{ fontSize: 13, color: "#2C3347", lineHeight: 1.65, fontStyle: "italic" }}>"{current.scripture.text}"</div>
                </div>
              )}

              {/* Note */}
              {current.note && (
                <div style={{ fontSize: 14, color: "#2C3347", lineHeight: 1.75, marginBottom: 16 }}>{current.note}</div>
              )}

              {/* Board entries */}
              {current.entries && current.entries.length > 0 && (
                <div style={{ background: "#FFFFFF", borderRadius: 14, padding: "16px 18px", marginBottom: 16 }}>
                  {current.entrySections ? current.entrySections.map((sec, si) => (
                    <div key={si}>
                      {si > 0 && <div style={{ height: 1, background: "#DDE3F0", margin: "14px 0" }} />}
                      <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", color: "#8A93A8", textTransform: "uppercase", marginBottom: 10 }}>{sec.label}</div>
                      <FadeEntryList items={sec.items} color={sec.color} shownKey={sec.key} shown={shown} onShowMore={showMore} />
                    </div>
                  )) : (
                    <FadeEntryList items={current.entries} color={color} shownKey={current.shownKey || `s${step}`} shown={shown} onShowMore={showMore} />
                  )}
                </div>
              )}

              {/* Extra content (dark card for doxology etc) */}
              {current.extra && current.extra}
            </div>
          </div>

          {/* Fixed footer — countdown + next */}
          <div style={{ padding: "16px 5vw 32px", background: "#EEF1F8", borderTop: "1px solid #DDE3F0" }}>
            {isLast ? (
              <button onClick={onClose}
                style={{ background: color, color: "#FFFFFF", border: "none", borderRadius: 12, padding: "16px 24px", fontSize: 15, fontWeight: 700, cursor: "pointer", width: "100%" }}>
                Amen
              </button>
            ) : (
              <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                {!unlocked ? <CountdownRing /> : (
                  <div style={{ width: 44, height: 44, borderRadius: "50%", background: color + "20", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                    <span style={{ fontSize: 18, color: color }}>✓</span>
                  </div>
                )}
                <button onClick={() => { if (unlocked) { setStep(s => s + 1); window.scrollTo(0,0); } }}
                  disabled={!unlocked}
                  style={{ flex: 1, background: unlocked ? color : "#DDE3F0", color: unlocked ? "#FFFFFF" : "#8A93A8", border: "none", borderRadius: 12, padding: "16px 24px", fontSize: 15, fontWeight: 700, cursor: unlocked ? "pointer" : "not-allowed", transition: "all 0.3s" }}>
                  {unlocked ? "Next →" : `Take your time... (${countdown}s)`}
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }

    function GuidedPrayerScreen({ entries, onClose }) {
      const kingdomScriptures = React.useState(() => pickScriptures(2))[0];

      const steps = [

            "For yours is the kingdom and the power and the glory forever. Amen."

          <div style={{ fontSize: 13, color: "rgba(255,255,255,0.75)", lineHeight: 1.7 }}>

        </div>
      );

      const resolvedSteps = steps.map(s => {
        if (s.extraKey === "kingdom") return { ...s, extra: renderKingdomExtra() };
        if (s.extraKey === "doxology") return { ...s, extra: renderDoxologyExtra() };
        return s;
      });
      return <StepPrayerShell title="The Lord's Prayer" steps={resolvedSteps} onClose={onClose} accentColor="#6B5FD6" />;
    }

        { title: "The Brazen Laver", subtitle: "Cleansing through the Word", color: "#5B8DD9", scripture: wordVerse[0], note: "Let the Word wash over you. Declare who God is.", entries: active("worship"), shownKey: "worship" },
        { title: "The Table of Showbread", subtitle: "Standing on His promises", color: "#6B5FD6", scripture: worshipVerse[0], note: "Stand on what God has said. Declare His promises over your life and your needs.", entries: [] },

      ];

      return <StepPrayerShell title="The Tabernacle Prayer" steps={steps} onClose={onClose} accentColor={tabAccent} />;

    function DailyOfficeScreen({ onClose }) {
      const [selected, setSelected] = React.useState(null);
      const [verse, setVerse] = React.useState(null);

      const openOffice = (office) => {
        const shuffled = [...office.scriptures].sort(() => Math.random() - 0.5);
        setVerse(shuffled[0]);
        setSelected(office);
      };

      const pad = (n) => String(n).padStart(2, "0");

      const generateOfficeICS = (office) => {
        const [h, m] = office.time.split(":").map(Number);
        const now = new Date();
        now.setHours(h, m, 0, 0);
        const end = new Date(now.getTime() + 15 * 60000);
        const fmt = (d) => d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate()) + "T" + pad(d.getHours()) + pad(d.getMinutes()) + "00";
        const ics = [
          "BEGIN:VCALENDAR",
          "VERSION:2.0",
          "CALSCALE:GREGORIAN",
          "PRODID:-//Groundwork//Prayer App//EN",
          "BEGIN:VEVENT",
          "UID:" + Date.now() + "@groundwork",
          "DTSTART:" + fmt(now),
          "DTEND:" + fmt(end),
          "SUMMARY:" + office.name + " — Groundwork",
          "DESCRIPTION:Daily Office — " + office.latin + ". Time to pray.",
          "TRANSP:OPAQUE",
          "RRULE:FREQ=DAILY",
          "END:VEVENT",
          "END:VCALENDAR",
        ].join("\r\n");
        const blob = new Blob([ics], { type: "text/calendar;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = office.id + "-prayer.ics"; a.click();
        URL.revokeObjectURL(url);
      };

      const generateGoogleLink = (office) => {
        const [h, m] = office.time.split(":").map(Number);
        const now = new Date();
        now.setHours(h, m, 0, 0);
        const end = new Date(now.getTime() + 15 * 60000);
        const fmt = (d) => d.toISOString().replace(/[-:]/g,"").split(".")[0] + "Z";
        const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(office.name + " — Groundwork")}&dates=${fmt(now)}/${fmt(end)}&recur=RRULE:FREQ%3DDAILY&details=${encodeURIComponent("Daily Office — " + office.latin)}`;
        window.open(url, "_blank");
      };

      // Office detail view
      if (selected) {
        return (
          <div style={{ padding: "5vw", paddingBottom: 100, maxWidth: 600, margin: "0 auto", width: "100%" }}>
            <button onClick={() => setSelected(null)} style={{ background: "none", border: "none", fontSize: 13, color: selected.color, cursor: "pointer", padding: "0 0 20px 0", fontWeight: 500 }}>← Back</button>

            <div style={{ background: selected.id === "night" ? "#2D2A5E" : "#FFFFFF", borderRadius: 16, padding: "22px", marginBottom: 16 }}>
              <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", color: selected.id === "night" ? "rgba(255,255,255,0.4)" : "#8A93A8", textTransform: "uppercase", marginBottom: 6 }}>{selected.latin} · {selected.time}</div>
              <div style={{ fontSize: 22, fontWeight: 700, color: selected.id === "night" ? "#FFFFFF" : "#1A1F2E", letterSpacing: "-0.02em", marginBottom: 6 }}>{selected.name}</div>
              <div style={{ fontSize: 13, color: selected.id === "night" ? "rgba(255,255,255,0.55)" : "#8A93A8", fontStyle: "italic", marginBottom: 20 }}>{selected.tag}</div>
              <div style={{ height: 1, background: selected.id === "night" ? "rgba(255,255,255,0.1)" : "#DDE3F0", marginBottom: 20 }} />
              <div style={{ fontSize: 14, lineHeight: 1.8, color: selected.id === "night" ? "rgba(255,255,255,0.8)" : "#2C3347", whiteSpace: "pre-line" }}>{selected.teaching}</div>
            </div>

            {/* Scripture */}
            {verse && (
              <div style={{ background: selected.color + "18", borderLeft: `3px solid ${selected.color}`, borderRadius: "0 12px 12px 0", padding: "14px 16px", marginBottom: 16 }}>
                <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", color: selected.color, textTransform: "uppercase", marginBottom: 6 }}>{verse.ref}</div>
                <div style={{ fontSize: 14, lineHeight: 1.7, color: "#2C3347", fontStyle: "italic" }}>"{verse.text}"</div>
              </div>
            )}

            {/* Framework */}
            <div style={{ background: "#FFFFFF", borderRadius: 14, padding: "18px 20px", marginBottom: 16 }}>
              <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", color: "#8A93A8", textTransform: "uppercase", marginBottom: 14 }}>How to pray this office</div>
              {selected.framework.map((step, i) => (
                <div key={i} style={{ display: "flex", gap: 12, marginBottom: 12, alignItems: "flex-start" }}>
                  <div style={{ width: 24, height: 24, borderRadius: "50%", background: selected.color + "22", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                    <span style={{ fontSize: 11, fontWeight: 700, color: selected.color }}>{i + 1}</span>
                  </div>
                  <div style={{ fontSize: 14, color: "#2C3347", lineHeight: 1.6, paddingTop: 2 }}>{step}</div>
                </div>
              ))}
            </div>

            {/* Practice timer */}
            <PracticeTimer practiceText={"Use this time to pray through the framework above in your own words. No script — just you and God."} />

            {/* Set reminder */}
            <div style={{ background: "#FFFFFF", borderRadius: 14, padding: "18px 20px", marginTop: 16 }}>
              <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.1em", color: "#8A93A8", textTransform: "uppercase", marginBottom: 6 }}>Set a reminder</div>
              <div style={{ fontSize: 13, color: "#8A93A8", marginBottom: 14, lineHeight: 1.6 }}>
                Add {selected.name} to your calendar as a daily recurring event at {selected.time}. Marked busy so your time stays protected.
              </div>
              <button onClick={() => generateOfficeICS(selected)}
                style={{ background: selected.color, color: "#FFFFFF", border: "none", borderRadius: 10, padding: "13px 20px", fontSize: 14, fontWeight: 600, cursor: "pointer", width: "100%", marginBottom: 10 }}>
                ↓ Download .ics file
              </button>
              <button onClick={() => generateGoogleLink(selected)}
                style={{ background: "#FFFFFF", color: selected.color, border: `1px solid ${selected.color}`, borderRadius: 10, padding: "13px 20px", fontSize: 14, fontWeight: 600, cursor: "pointer", width: "100%" }}>
                Open Google Calendar
              </button>
            </div>
          </div>
        );
      }

      // Office overview
      return (
        <div style={{ padding: "5vw", paddingBottom: 80, maxWidth: 600, margin: "0 auto", width: "100%" }}>
          <button onClick={onClose} style={{ background: "none", border: "none", fontSize: 13, color: "#6B5FD6", cursor: "pointer", padding: "0 0 4px 0", fontWeight: 500 }}>← Back to models</button>

          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.12em", color: "#8A93A8", textTransform: "uppercase", marginBottom: 4, marginTop: 16 }}>Model 3</div>
          <div style={{ fontSize: 22, fontWeight: 700, color: "#1A1F2E", letterSpacing: "-0.02em", marginBottom: 10 }}>The Daily Office</div>

          <div style={{ background: "#FFFFFF", borderRadius: 14, padding: "18px 20px", marginBottom: 24 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: "#1A1F2E", marginBottom: 8 }}>What is the Daily Office?</div>
            <div style={{ fontSize: 13, lineHeight: 1.75, color: "#2C3347" }}>
              The Daily Office is the ancient practice of fixed-hour prayer — pausing at set times throughout the day to turn toward God. Christians have practiced it since the early church, rooted in Jewish prayer rhythms that Jesus himself observed.
              <br /><br />
              It isn't about saying the right words. It's about building a rhythm that keeps you oriented toward God no matter what the day brings. The goal is a life where prayer isn't an interruption — it's the thread running through everything.
            </div>
          </div>

          <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.14em", color: "#8A93A8", textTransform: "uppercase", marginBottom: 16 }}>The Four Offices</div>

          {DAILY_OFFICES.map(office => (
            <div key={office.id} onClick={() => openOffice(office)}
              style={{ background: office.id === "night" ? "#2D2A5E" : "#FFFFFF", borderRadius: 14, padding: "18px 20px", marginBottom: 10, cursor: "pointer", transition: "all 0.15s" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                <div style={{ width: 44, height: 44, borderRadius: 12, background: office.color + "22", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, fontSize: 20 }}>
                  {office.icon}

                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                    <div style={{ fontSize: 15, fontWeight: 700, color: office.id === "night" ? "#FFFFFF" : "#1A1F2E", marginBottom: 3 }}>{office.name}</div>
                    <div style={{ fontSize: 12, color: office.id === "night" ? "rgba(255,255,255,0.4)" : "#8A93A8", flexShrink: 0, marginLeft: 8 }}>{office.time}</div>
                  </div>
                  <div style={{ fontSize: 12, color: office.id === "night" ? "rgba(255,255,255,0.55)" : "#8A93A8" }}>{office.tag}</div>
                  <div style={{ fontSize: 11, fontWeight: 600, color: office.color, marginTop: 4, letterSpacing: "0.04em" }}>{office.latin}</div>
                </div>
              </div>
            </div>
          ))}
        </div>
      );
    }


    // ── Psalms Guided Prayer (single type) ────────────────────────────────────
    function PsalmTypePrayerScreen({ psalmType, entries, onClose }) {
      const verse = React.useState(() => {
        const shuffled = [...psalmType.scriptures].sort(() => Math.random() - 0.5);
        return shuffled[0];
      })[0];

      const boardEntries = (entries[psalmType.boardKey] || []).filter(e => !e.done);
      const answered = (entries.praise || []).filter(e => e.done);
      const firstParagraph = psalmType.teaching.split(/\n\n/)[0];

      const renderAnsweredExtra = () => {
        if (psalmType.id !== "thanksgiving" || answered.length === 0) return null;
        return (
          <div style={{ background: "#FFFFFF", borderRadius: 14, padding: "16px 18px", marginTop: 12 }}>
            <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: "0.08em", color: "#8A93A8", textTransform: "uppercase", marginBottom: 10 }}>Answered prayers</div>
            {answered.slice(0, 3).map(e => (
              <div key={e.id} style={{ display: "flex", gap: 10, alignItems: "flex-start", marginBottom: 8 }}>
                <div style={{ width: 6, height: 6, borderRadius: "50%", background: "#4A9E7F", flexShrink: 0, marginTop: 6 }} />
                <div style={{ fontSize: 13, color: "#2C3347", lineHeight: 1.6 }}>{e.text}</div>
              </div>
            ))}
          </div>
        );
      };

      const steps = [
        { title: psalmType.name, subtitle: psalmType.tag, color: PSALM_COLOR, scripture: verse, note: firstParagraph, entries: boardEntries, shownKey: psalmType.id, extra: renderAnsweredExtra() },
        { title: "Practice", subtitle: psalmType.keyPsalm, color: PSALM_COLOR, note: psalmType.practice, entries: [] },
      ];

      return <StepPrayerShell title={psalmType.name} steps={steps} onClose={onClose} accentColor={PSALM_COLOR} />;
    }

              <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>

    // ── Main App ──────────────────────────────────────────────────────────────
    function App() {
      // ── Auth state ──
      const [user, setUser]                 = useState(null);
      const [authLoading, setAuthLoading]   = useState(true);

      // ── App state ──
      const [tab, setTab]                   = useState("learn");
      const [showHome, setShowHome]         = useState(true);
      const [showSettings, setShowSettings] = useState(false);
      const [showPrayer, setShowPrayer]     = useState(false);
      const [showTabPrayer, setShowTabPrayer] = useState(false);
      const [showDailyOffice, setShowDailyOffice] = useState(false);
      const [showPsalms, setShowPsalms]         = useState(false);
      const [activeModule, setActiveModule] = useState("lords");
      const [tabSegments, setTabSegments]   = useState(TABERNACLE_SEGMENTS);
      const [schedule, setSchedule]         = useState({ freq: null, times: ["07:00"], customDays: [], duration: 30 });
      const [selected, setSelected]         = useState(null);
      const [segments, setSegments]         = useState(SEGMENTS);
      const [fastType, setFastType]         = useState(null);
      const [fastActive, setFastActive]     = useState(false);
      const [fastStart, setFastStart]       = useState(null);
      const [fastNotes, setFastNotes]       = useState("");
      const [entries, setEntries]           = useState(INITIAL_ENTRIES);
      const [activeSection, setActiveSection] = useState(null);
      const [showAdd, setShowAdd]           = useState(false);
      const [newEntry, setNewEntry]         = useState({ name: "", text: "" });
      const [dataLoading, setDataLoading]   = useState(false);

      // ── Auth listener ──
      useEffect(() => {
        const unsub = auth.onAuthStateChanged(u => {
          setUser(u);
          setAuthLoading(false);
        });
        return unsub;
      }, []);

      // ── Load user data from Firestore on login ──
      useEffect(() => {
        if (!user) return;
        setDataLoading(true);
        const ref = db.collection("users").doc(user.uid);
        ref.get().then(doc => {
          if (doc.exists) {
            const data = doc.data();
            if (data.entries)     setEntries({ ...INITIAL_ENTRIES, ...data.entries });
            if (data.segments)    setSegments(data.segments);
            if (data.tabSegments) setTabSegments(data.tabSegments);
            if (data.schedule)    setSchedule(data.schedule);
          }
          setDataLoading(false);
        }).catch(() => setDataLoading(false));
      }, [user]);

      // ── Save to Firestore whenever data changes ──
      useEffect(() => {
        if (!user || dataLoading) return;
        const ref = db.collection("users").doc(user.uid);
        const timer = setTimeout(() => {
          ref.set({ entries, segments, tabSegments, schedule }, { merge: true });
        }, 1000);
        return () => clearTimeout(timer);
      }, [entries, segments, tabSegments, schedule, user]);

      const signOut = () => auth.signOut();

      const completed = segments.filter(s => s.complete).length;

      // ── Show login if not signed in ──
      if (authLoading) return (
        <div style={{ minHeight: "100vh", background: "#2D2A5E", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <div style={{ fontSize: 13, color: "rgba(255,255,255,0.5)" }}>Loading...</div>
        </div>
      );
      if (!user) return <LoginScreen />;

      const markComplete = (id) => {
        setSegments(segments.map(s => s.id === id ? { ...s, complete: true } : s));
        setSelected(null);
      };

      const markTabComplete = (id) => {
        setTabSegments(tabSegments.map(s => s.id === id ? { ...s, complete: true } : s));
        setSelected(null);
      };

      const addEntry = (sectionId) => {
        if (!newEntry.text) return;
        const sec = SECTIONS.find(s => s.id === sectionId);
        const entry = { id: Date.now(), text: newEntry.text, date: "Today", done: false };
        if (sectionId === "intercession") entry.name = newEntry.name || "Someone";
        setEntries({ ...entries, [sectionId]: [...entries[sectionId], entry] });
        setNewEntry({ name: "", text: "" });
        setShowAdd(false);
      };

      const toggleDone = (sectionId, id) => {
        setEntries({
          ...entries,
          [sectionId]: entries[sectionId].map(e => e.id === id ? { ...e, done: !e.done } : e)
        });

      const navBtn = (active) => ({
        flex: 1, padding: "14px 0", fontSize: 12, fontWeight: active ? 600 : 400,

        color: active ? C.accent : C.stone,
        borderBottom: active ? `2px solid ${C.accent}` : "2px solid transparent",
        transition: "all 0.15s",

              <div onClick={() => setActiveModule("tabernacle")} style={{ flex: 1, background: C.white, borderRadius: 10, padding: "12px 14px", cursor: "pointer", border: `1px solid ${C.paper}` }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: C.stone, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 2 }}>Model 2</div>
                <div style={{ fontSize: 13, fontWeight: 600, color: C.ink }}>The Tabernacle Prayer</div>

              <div onClick={() => setShowDailyOffice(true)} style={{ flex: 1, background: C.white, borderRadius: 10, padding: "12px 14px", cursor: "pointer", border: `1px solid ${C.paper}` }}>

              <div onClick={() => setShowPsalms(true)} style={{ flex: 1, background: C.white, borderRadius: 10, padding: "12px 14px", cursor: "pointer", border: `1px solid ${C.paper}` }}>

                <div style={{ fontSize: 13, fontWeight: 600, color: C.ink }}>Praying the Psalms</div>

            {/* About this model */}
            <div style={{ background: C.white, borderRadius: 14, padding: "18px 20px", marginBottom: 20 }}>

              <div style={{ fontSize: 13, lineHeight: 1.75, color: C.body }}>

              Pray this model

            {currentSegs.map(seg => (
              <div key={seg.id} style={card(seg.complete)} onClick={() => setSelected(seg.id)}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                  <div>
                    <div style={{ fontSize: 15, fontWeight: 600, color: C.ink, marginBottom: 4, letterSpacing: "-0.01em" }}>"{seg.phrase}"</div>
                    <div style={{ fontSize: 12, color: C.stone }}>{seg.tag}</div>

                  <div style={{ flexShrink: 0, marginLeft: 12 }}>
                    {seg.complete
                      ? <span style={{ fontSize: 10, fontWeight: 600, color: C.accent, letterSpacing: "0.08em", textTransform: "uppercase" }}>Done</span>

                <div style={{ fontSize: 11, fontWeight: 700, color: "rgba(255,255,255,0.7)", letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 2 }}>Model 2</div>
                <div style={{ fontSize: 13, fontWeight: 600, color: C.white }}>The Tabernacle Prayer</div>
              </div>
              <div onClick={() => setShowDailyOffice(true)} style={{ flex: 1, background: C.white, borderRadius: 10, padding: "12px 14px", cursor: "pointer", border: `1px solid ${C.paper}` }}>

                <div style={{ fontSize: 13, fontWeight: 600, color: C.ink }}>The Daily Office</div>

              <div onClick={() => setShowPsalms(true)} style={{ flex: 1, background: C.white, borderRadius: 10, padding: "12px 14px", cursor: "pointer", border: `1px solid ${C.paper}` }}>

      // ── Settings / Schedule ──
      const renderSettings = () => {
        const freqOptions = [
          { id: "2x",      label: "Twice a day",   desc: "Morning and evening" },
          { id: "daily",   label: "Every day",      desc: "Once daily" },
          { id: "other",   label: "Every other day", desc: "Alternating days" },
          { id: "custom",  label: "Custom",          desc: "Choose specific days" },
        ];
        const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

        const toggleDay = (d) => {
          const cur = schedule.customDays;
          setSchedule({ ...schedule, customDays: cur.includes(d) ? cur.filter(x => x !== d) : [...cur, d] });
        };

        const updateTime = (idx, val) => {
          const times = [...schedule.times];
          times[idx] = val;
          setSchedule({ ...schedule, times });
        };

        const pad = (n) => String(n).padStart(2, "0");

        const formatICSDate = (dateObj) => {
          return dateObj.getFullYear() + pad(dateObj.getMonth()+1) + pad(dateObj.getDate()) +
            "T" + pad(dateObj.getHours()) + pad(dateObj.getMinutes()) + "00";
        };

        const getRRule = () => {
          if (schedule.freq === "daily") return "RRULE:FREQ=DAILY";
          if (schedule.freq === "2x") return "RRULE:FREQ=DAILY";
          if (schedule.freq === "other") return "RRULE:FREQ=DAILY;INTERVAL=2";
          if (schedule.freq === "custom" && schedule.customDays.length > 0) {
            const dayMap = { Sun:"SU", Mon:"MO", Tue:"TU", Wed:"WE", Thu:"TH", Fri:"FR", Sat:"SA" };
            return "RRULE:FREQ=WEEKLY;BYDAY=" + schedule.customDays.map(d => dayMap[d]).join(",");
          }
          return "RRULE:FREQ=DAILY";
        };

        const generateICS = () => {
          const timesToUse = schedule.freq === "2x"
            ? (schedule.times.length >= 2 ? schedule.times : ["07:00","19:00"])
            : [schedule.times[0] || "07:00"];

          let events = "";
          timesToUse.forEach((t, i) => {
            const [h, m] = t.split(":").map(Number);
            const now = new Date();
            now.setHours(h, m, 0, 0);
            const end = new Date(now.getTime() + schedule.duration * 60000);
            const uid = Date.now() + i + "@groundwork";
            events += [
              "BEGIN:VEVENT",
              "UID:" + uid,
              "DTSTART:" + formatICSDate(now),
              "DTEND:" + formatICSDate(end),
              "SUMMARY:Time with God",
              "DESCRIPTION:Scheduled prayer time — Groundwork app",
              "TRANSP:OPAQUE",
              getRRule(),
              "END:VEVENT",
            ].join("\r\n") + "\r\n";
          });

          const ics = [
            "BEGIN:VCALENDAR",
            "VERSION:2.0",
            "CALSCALE:GREGORIAN",
            "PRODID:-//Groundwork//Prayer App//EN",
            events.trim(),
            "END:VCALENDAR",
          ].join("\r\n");

          const blob = new Blob([ics], { type: "text/calendar;charset=utf-8" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url; a.download = "time-with-god.ics"; a.click();
          URL.revokeObjectURL(url);
        };

        const generateGoogleLink = () => {
          const t = schedule.times[0] || "07:00";
          const [h, m] = t.split(":").map(Number);
          const now = new Date();
          now.setHours(h, m, 0, 0);
          const end = new Date(now.getTime() + schedule.duration * 60000);
          const fmt = (d) => d.toISOString().replace(/[-:]/g,"").split(".")[0] + "Z";
          const recur = schedule.freq === "daily" || schedule.freq === "2x" ? "RRULE:FREQ%3DDAILY" :
            schedule.freq === "other" ? "RRULE:FREQ%3DDAILY%3BINTERVAL%3D2" : "RRULE:FREQ%3DDAILY";
          const url = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=Time+with+God&dates=${fmt(now)}/${fmt(end)}&recur=${recur}&details=Scheduled+prayer+time+%E2%80%94+Groundwork+app`;
          window.open(url, "_blank");

                  {days.map(d => (
                    <div key={d} onClick={() => toggleDay(d)}
                      style={{ padding: "8px 14px", borderRadius: 20, fontSize: 13, fontWeight: 600, cursor: "pointer", background: schedule.customDays.includes(d) ? C.accent : C.white, color: schedule.customDays.includes(d) ? C.white : C.ink, border: `1px solid ${schedule.customDays.includes(d) ? C.accent : C.paper}`, transition: "all 0.15s" }}>
                      {d}
                    </div>
                  ))}
                </div>
              </>

            {/* Time pickers */}
            {schedule.freq && (
              <>
                <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.14em", color: C.stone, textTransform: "uppercase", margin: "20px 0 12px" }}>
                  {schedule.freq === "2x" ? "Times" : "Time"}
                </div>
                {schedule.times.map((t, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 10 }}>
                    {schedule.freq === "2x" && (
                      <div style={{ fontSize: 12, color: C.stone, width: 60, flexShrink: 0 }}>{i === 0 ? "Morning" : "Evening"}</div>

                      style={{ padding: "8px 16px", borderRadius: 20, fontSize: 13, fontWeight: 600, cursor: "pointer", background: schedule.duration === d ? C.accent : C.white, color: schedule.duration === d ? C.white : C.ink, border: `1px solid ${schedule.duration === d ? C.accent : C.paper}`, transition: "all 0.15s" }}>

                </div>

            {/* Export buttons */}
            {ready && (
              <div style={{ marginTop: 28 }}>
                <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: "0.14em", color: C.stone, textTransform: "uppercase", marginBottom: 14 }}>Add to calendar</div>

        );

        <div style={{ fontFamily: "-apple-system, BlinkMacSystemFont, 'Inter', sans-serif", background: C.bg, minHeight: "100vh", width: "100%", color: C.ink }}>
          {/* Header */}
          <div style={{ padding: "52px 5vw 20px", borderBottom: `1px solid ${C.paper}`, display: "flex", alignItems: "flex-end", justifyContent: "space-between" }}>
            <div>
              <div style={{ fontSize: 11, fontWeight: 600, letterSpacing: "0.12em", color: C.stone, textTransform: "uppercase", marginBottom: 4 }}>Groundwork</div>
              <div style={{ fontSize: 22, fontWeight: 700, color: C.ink, letterSpacing: "-0.02em" }}>
                {showSettings ? "Schedule" : headerTitle[tab]}
              </div>
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              {user && (
                <img src={user.photoURL} alt="avatar" style={{ width: 32, height: 32, borderRadius: "50%", cursor: "pointer", border: `2px solid ${C.paper}` }} onClick={signOut} title="Sign out" />
              )}
              <button onClick={() => { setShowSettings(false); setShowHome(true); }} style={{ background: C.paper, border: "none", borderRadius: 10, width: 38, height: 38, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 15, flexShrink: 0, marginBottom: 2 }}>
                ⌂
              </button>
              <button onClick={() => setShowSettings(!showSettings)} style={{ background: showSettings ? C.accent : C.paper, border: "none", borderRadius: 10, width: 38, height: 38, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 16, flexShrink: 0, marginBottom: 2 }}>
                {showSettings ? "✕" : "⚙"}
              </button>
            </div>
          </div>

          {/* Nav */}
          <nav style={{ display: "flex", borderBottom: `1px solid ${C.paper}`, background: C.bg, position: "sticky", top: 0, zIndex: 10 }}>
            {[["learn","Learn"],["board","Board"],["fast","Fast"]].map(([id, label]) => (
              <button key={id} style={navBtn(tab === id)} onClick={() => { setTab(id); setShowHome(false); setShowSettings(false); setShowDailyOffice(false); setShowTabPrayer(false); setShowPrayer(false); setShowPsalms(false); }}>{label}</button>
            ))}
          </nav>

          {showHome ? renderHome() : showSettings ? renderSettings() : showPsalms ? (
            <PsalmsModelScreen entries={entries} onClose={() => setShowPsalms(false)} />
          ) : showDailyOffice ? (
            <DailyOfficeScreen onClose={() => setShowDailyOffice(false)} />
          ) : showTabPrayer ? (
            <TabernaclePrayerScreen entries={entries} onClose={() => setShowTabPrayer(false)} />
          ) : showPrayer ? (
            <GuidedPrayerScreen entries={entries} onClose={() => setShowPrayer(false)} />
          ) : (
            <>
              {tab === "learn" && renderLearn()}
              {tab === "board" && renderBoard()}
              {tab === "fast"  && renderFast()}
            </>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
