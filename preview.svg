<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" style="background:#1A1740">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D2A5E"/>
      <stop offset="100%" stop-color="#1A1740"/>
    </linearGradient>
    <linearGradient id="rightPageGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C6FE8"/>
      <stop offset="100%" stop-color="#5B4FC4"/>
    </linearGradient>
  </defs>

  <!-- Full bleed background -->
  <rect width="1200" height="630" fill="#1A1740"/>
  <!-- Gradient overlay -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Icon — left side, matches logo v4 exactly -->
  <!-- Icon background pill -->
  <rect x="80" y="90" width="340" height="380" rx="76" fill="#EEF1F8" opacity="0.08"/>

  <!-- Left page -->
  <path d="M138 424 L138 238 Q138 224 152 220 L238 204 L238 400 Q202 406 168 414 Z"
    fill="#F0F2F8" opacity="0.95"/>

  <!-- Right page -->
  <path d="M362 424 L362 238 Q362 224 348 220 L262 204 L262 400 Q298 406 332 414 Z"
    fill="url(#rightPageGrad)"/>

  <!-- Spine -->
  <rect x="244" y="204" width="10" height="196" rx="5" fill="#F0F2F8" opacity="0.9"/>

  <!-- Base -->
  <rect x="126" y="424" width="248" height="9" rx="4.5" fill="#F0F2F8" opacity="0.2"/>

  <!-- Cross vertical -->
  <rect x="244" y="130" width="10" height="80" rx="5" fill="#7C6FE8"/>

  <!-- Cross horizontal -->
  <rect x="210" y="158" width="80" height="10" rx="5" fill="#7C6FE8"/>

  <!-- Glow -->
  <ellipse cx="249" cy="164" rx="52" ry="26" fill="#7C6FE8" opacity="0.25"/>

  <!-- Wordmark -->
  <text x="500" y="296"
    font-family="-apple-system, Helvetica Neue, Arial, sans-serif"
    font-size="82"
    font-weight="500"
    letter-spacing="-2"
    fill="#F0F2F8">Groundwork</text>

  <!-- Tagline -->
  <text x="504" y="352"
    font-family="-apple-system, Helvetica Neue, Arial, sans-serif"
    font-size="22"
    font-weight="400"
    letter-spacing="5"
    fill="#7C6FE8"
    opacity="0.9">LEARNING TO PRAY</text>

  <!-- Divider -->
  <rect x="500" y="374" width="616" height="2" rx="1" fill="#7C6FE8" opacity="0.25"/>

  <!-- Subtitle -->
  <text x="504" y="412"
    font-family="-apple-system, Helvetica Neue, Arial, sans-serif"
    font-size="20"
    font-weight="400"
    fill="#F0F2F8"
    opacity="0.45">A prayer practice app</text>
</svg>
